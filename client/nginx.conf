server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # TLS, compression and routing to the API are handled by Caddy at the edge;
    # this server only serves the static bundle.

    # Hashed Vite assets are content-addressed, so they can be cached forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA fallback: react-router owns the client-side routes, so any unknown
    # path must return index.html rather than a 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Do not leak the nginx version in error pages / Server header.
    server_tokens off;
}
