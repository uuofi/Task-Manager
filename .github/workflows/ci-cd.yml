name: CI/CD

# One continuous pipeline:
#
#   pull request  ->  verify only        (lint -> build -> images -> compose)
#   push to main  ->  verify -> push images to GHCR -> deploy to the VPS
#
# The deploy stages depend on the verify stages, so code that fails linting or
# fails to build can never reach production.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Superseded PR runs are pointless, so cancel them — but never cancel a run on
  # main, which may be midway through deploying.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  # True only for a real push to main: gates pushing images and deploying.
  # Referenced via the `deployable` output below.
  DEPLOYABLE: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}

jobs:
  # ===========================================================================
  # CI — runs on every pull request and every push.
  # ===========================================================================
  lint:
    name: Lint (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace: [server, client]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.workspace }}/package-lock.json

      - run: npm ci
        working-directory: ${{ matrix.workspace }}

      - run: npm run lint
        working-directory: ${{ matrix.workspace }}

  build-client:
    name: Build client bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - run: npm ci
        working-directory: client

      - run: npm run build
        working-directory: client

  compose-validate:
    name: Validate compose files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # `docker compose config` fails on the `${VAR:?}` guards unless the
      # required values are present, so validate against the example file.
      - name: Validate docker-compose.yml
        run: |
          cp .env.example .env
          docker compose --env-file .env -f docker-compose.yml config --quiet

      - name: Validate docker-compose.dev.yml
        run: docker compose -f docker-compose.dev.yml config --quiet

  # ===========================================================================
  # CD — same job builds the images for every branch, but only PUSHES them to
  # GHCR on main. That way a pull request proves the images still build without
  # publishing anything.
  # ===========================================================================
  images:
    name: Build image (${{ matrix.image }})
    needs: [lint, build-client, compose-validate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: true
      matrix:
        image: [server, client]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: env.DEPLOYABLE == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR rejects uppercase image names and this repo is "uuofi/Task-Manager",
      # so the owner/repo pair has to be lowercased explicitly.
      - name: Compute image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}-${{ matrix.image }}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.image }}
          target: runner
          push: ${{ env.DEPLOYABLE == 'true' }}
          # The SHA tag is what the server actually deploys; `latest` is a
          # convenience pointer for manual pulls.
          tags: |
            ${{ steps.img.outputs.name }}:${{ github.sha }}
            ${{ steps.img.outputs.name }}:latest
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          provenance: false

  deploy:
    name: Deploy to VPS
    needs: images
    # Spelled out rather than reusing the DEPLOYABLE env var: the `env` context
    # is not available in a job-level `if`.
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # To require a manual approval before each deploy, create a "production"
    # environment in the repo settings, add protection rules, then add
    # `environment: production` here.
    permissions:
      contents: read
      packages: read
    # Never let two deploys touch the server at once, and never cancel one
    # midway — this queues them instead.
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      # Only the compose config travels; /opt/taskcontrol/.env lives on the
      # server and is deliberately never overwritten from CI.
      - name: Copy compose files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: "docker-compose.yml,Caddyfile"
          target: /opt/taskcontrol

      - name: Pull images and restart stack
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG: ${{ github.sha }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          envs: IMAGE_TAG,GHCR_USER,GHCR_TOKEN
          script: |
            set -euo pipefail
            cd /opt/taskcontrol

            if [ ! -f .env ]; then
              echo "::error::/opt/taskcontrol/.env is missing. Create it from .env.example before the first deploy."
              exit 1
            fi

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            # Point the stack at the images this run just built.
            if grep -q '^IMAGE_TAG=' .env; then
              sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${IMAGE_TAG}|" .env
            else
              echo "IMAGE_TAG=${IMAGE_TAG}" >> .env
            fi

            docker compose pull
            docker compose up -d --remove-orphans

            docker logout ghcr.io

      - name: Verify the API is healthy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -euo pipefail
            cd /opt/taskcontrol

            cid=$(docker compose ps -q server)
            if [ -z "$cid" ]; then
              echo "::error::server container is not running."
              docker compose ps
              exit 1
            fi

            # Polls the container's HEALTHCHECK, which hits /api/v1/health — the
            # process only answers there once it is actually serving traffic.
            for i in $(seq 1 30); do
              status=$(docker inspect -f '{{.State.Health.Status}}' "$cid")
              if [ "$status" = "healthy" ]; then
                echo "API is healthy."
                docker image prune -f
                exit 0
              fi
              echo "waiting for server to become healthy (${i}/30, current: ${status})"
              sleep 5
            done

            echo "::error::Server did not become healthy — dumping logs."
            docker compose logs --tail=100 server
            exit 1
